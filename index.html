<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM // CYBER-CHRONO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <style>
        /* --- ESTILOS BASE NEO-TOKIO --- */
        :root {
            --bg-color: #050508;
            --neon-purple: #9d4edd;
            --neon-cyan: #00f5d4;
            --neon-orange: #ff6b35;
            --neon-red: #ff0054;
            --font-main: 'Arial Black', -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: var-font-main;
            overflow-x: hidden;
            transition: background-color 0.5s ease;
        }

        body.overload-active {
            animation: glitch-bg 0.1s infinite;
        }

        /* --- CONTENEDOR 3D (FIJO) --- */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none; /* Permite scroll sobre el canvas */
        }

        /* --- INTERFAZ HTML SCROLL (CAPA SUPERIOR) --- */
        .scroll-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
        }

        section {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 10vw;
        }

        .left-content {
            max-width: 50%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .right-content {
            margin-left: auto;
            max-width: 45%;
            text-align: right;
        }

        /* --- TIPOGRAFÍAS Y EFECTOS --- */
        .giant-text {
            font-size: clamp(3rem, 7vw, 9rem);
            font-family: var(--font-main);
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: -2px;
            opacity: 0;
            transform: translateY(50px);
        }

        .purple-glow { color: var(--neon-purple); text-shadow: 0 0 20px var(--neon-purple); }
        .cyan-glow { color: var(--neon-cyan); text-shadow: 0 0 20px var(--neon-cyan); }
        .orange-glow { color: var(--neon-orange); text-shadow: 0 0 20px var(--neon-orange); }

        .sub-text {
            font-size: 1.2rem;
            font-family: sans-serif;
            letter-spacing: 2px;
            color: #888;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* --- CONTADORES SECCIÓN 3 --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin-top: 2rem;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--neon-cyan);
            padding: 1.5rem;
            backdrop-filter: blur(5px);
        }

        .stat-num {
            font-size: 3rem;
            font-family: var(--font-main);
            color: #fff;
        }

        /* --- BOTÓN DE SOBRECARGA CRÍTICA --- */
        #overload-btn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 100;
            background: transparent;
            border: 2px solid var(--neon-red);
            color: var(--neon-red);
            font-family: var(--font-main);
            padding: 15px 30px;
            font-size: 1rem;
            cursor: pointer;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(255, 0, 84, 0.2);
            transition: all 0.3s ease;
        }

        #overload-btn:hover {
            background: var(--neon-red);
            color: #000;
            box-shadow: 0 0 30px var(--neon-red);
            transform: scale(1.05);
        }

        /* --- CAPA DE EFECTO GLITCH DE SOBRECARGA --- */
        #glitch-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255, 0, 84, 0.1);
            z-index: 99;
            display: none;
            pointer-events: none;
            mix-blend-mode: difference;
        }

        @keyframes glitch-bg {
            0% { background-color: #050508; }
            50% { background-color: #1a0010; }
            100% { background-color: #050508; }
        }
    </style>
</head>
<body>

    <div id="glitch-overlay"></div>
    <button id="overload-btn">DO NOT PRESS</button>
    <div id="canvas-container"></div>

    <div class="scroll-wrapper">
        <section id="sec-intro">
            <div class="left-content">
                <h1 class="giant-text purple-glow" id="t1">CYBER<br>CHRONO</h1>
                <p class="sub-text">AXIOM HOROLOGY // NEO-TOKYO RELOADED</p>
            </div>
        </section>

        <section id="sec-xray">
            <div class="left-content">
                <h2 class="giant-text cyan-glow" id="t2">TITANIO.<br>GRAFENO.<br>LUZ.</h2>
                <p class="sub-text">Arquitectura interna molecular expuesta.</p>
            </div>
        </section>

        <section id="sec-custom">
            <div class="right-content">
                <h2 class="giant-text orange-glow" id="t3">MUTACIÓN<br>TACTICAL</h2>
                <p class="sub-text">Estética blindada auto-configurable.</p>
            </div>
        </section>

        <section id="sec-scanner">
            <div class="left-content" style="max-width: 70%;">
                <h2 class="giant-text" id="t4" style="color: #fff;">SISTEMA OPERATIVO</h2>
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-num" id="stat-bat">0%</div>
                        <div class="sub-text">CAPACIDAD BATERÍA</div>
                    </div>
                    <div class="stat-box" style="border-left-color: var(--neon-orange);">
                        <div class="stat-num" id="stat-cpu">CORE</div>
                        <div class="sub-text">ESTADO PROCESADOR</div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Registrar ScrollTrigger en GSAP
        gsap.registerPlugin(ScrollTrigger);

        /* =========================================================================
           1. CONFIGURACIÓN DEL ENTORNO 3D (THREE.JS)
           ========================================================================= */
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Cámara
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 6;

        // Renderizador
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        /* =========================================================================
           2. ILUMINACIÓN PREMIUM DE ESTUDIO DE NEÓN
           ========================================================================= */
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);

        const rimLight = new THREE.DirectionalLight(0x9d4edd, 2); // Púrpura Eléctrico
        rimLight.position.set(-5, 3, -2);
        scene.add(rimLight);

        const keyLight = new THREE.DirectionalLight(0x00f5d4, 2); // Cian
        keyLight.position.set(5, 3, 2);
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0xff6b35, 1); // Naranja
        fillLight.position.set(0, -5, 2);
        scene.add(fillLight);

        /* =========================================================================
           3. CONSTRUCCIÓN PROCEDIMENTAL DEL RELOJ (GRUPO MAESTRO)
           ========================================================================= */
        const cyberWatch = new THREE.Group();

        // Materiales Avanzados
        const caseMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.4,
            roughness: 0.1,
            metalness: 0.1,
            transmission: 0.9, // Efecto Cristal/Transparente
            ior: 1.5,
            side: THREE.DoubleSide
        });

        const coreMaterial = new THREE.MeshStandardMaterial({
            color: 0x111115,
            metalness: 0.9,
            roughness: 0.2
        });

        const neonGearMaterial = new THREE.MeshStandardMaterial({
            color: 0x00f5d4,
            emissive: 0x00f5d4,
            emissiveIntensity: 0.5
        });

        // Componente A: Chasis Principal Externo (Cilindro Base)
        const caseGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.5, 32, 1, true);
        const watchCase = new THREE.Mesh(caseGeo, caseMaterial);
        watchCase.rotation.x = Math.PI / 2;
        cyberWatch.add(watchCase);

        // Componente B: Núcleo Interno Táctico
        const coreGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.4, 32);
        const watchCore = new THREE.Mesh(coreGeo, coreMaterial);
        watchCore.rotation.x = Math.PI / 2;
        cyberWatch.add(watchCore);

        // Componente C: Engranajes de Precisión (X-Ray exploding units)
        const gearGroup = new THREE.Group();
        const gearGeo = new THREE.TorusGeometry(0.8, 0.05, 8, 24);
        const gear1 = new THREE.Mesh(gearGeo, neonGearMaterial);
        gear1.position.z = 0.1;
        const gear2 = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.03, 8, 16), neonGearMaterial);
        gear2.position.z = -0.1;
        gearGroup.add(gear1, gear2);
        cyberWatch.add(gearGroup);

        // Componente D: Pantalla Holográfica Flotante
        const screenGeo = new THREE.RingGeometry(1.2, 1.3, 32);
        const screenMaterial = new THREE.MeshBasicMaterial({ color: 0x9d4edd, side: THREE.DoubleSide });
        const holoScreen = new THREE.Mesh(screenGeo, screenMaterial);
        holoScreen.position.z = 0.35;
        cyberWatch.add(holoScreen);

        // Componente E: Correas Superiores e Inferiores
        const strapMaterial = new THREE.MeshStandardMaterial({ color: 0x08080a, roughness: 0.7 });
        const strapGeo = new THREE.BoxGeometry(0.8, 1.5, 0.15);
        
        const topStrap = new THREE.Mesh(strapGeo, strapMaterial);
        topStrap.position.y = 1.4;
        topStrap.position.z = -0.1;
        
        const bottomStrap = topStrap.clone();
        bottomStrap.position.y = -1.4;

        cyberWatch.add(topStrap);
        cyberWatch.add(bottomStrap);

        scene.add(cyberWatch);

        // Rotación inicial base
        cyberWatch.rotation.x = 0.3;
        cyberWatch.rotation.y = -0.5;

        /* =========================================================================
           4. LÓGICA DE INTERACCIÓN MOUSE (SEGUIMIENTO SUAVE)
           ========================================================================= */
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;

        window.addEventListener('mousemove', (e) => {
            // Mapea la posición del mouse entre -1 y 1
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        /* =========================================================================
           5. ANIMACIONES SECUENCIALES CON GSAP SCROLLTRIGGER
           ========================================================================= */
        
        // Animaciones de Texto Iniciales (Fade In)
        gsap.to(".giant-text", {
            opacity: 1,
            translateY: 0,
            duration: 1,
            stagger: 0.2,
            ease: "power4.out"
        });

        // MASTER TIMELINE VINCULADO AL SCROLL
        const scrollTl = gsap.timeline({
            scrollTrigger: {
                trigger: ".scroll-wrapper",
                start: "top top",
                end: "bottom bottom",
                scrub: 1 // Suavizado de la animación con el scroll
            }
        });

        scrollTl
            // --- TRAMO 1: Despiece Explosivo ("X-Ray") ---
            .to(watchCase.position, { z: 1.5, duration: 2 }, 0)
            .to(topStrap.position, { y: 2.5, duration: 2 }, 0)
            .to(bottomStrap.position, { y: -2.5, duration: 2 }, 0)
            .to(gear1.position, { z: 0.8, rotation: 5, duration: 2 }, 0)
            .to(gear2.position, { z: -0.8, rotation: -5, duration: 2 }, 0)
            .to(cyberWatch.rotation, { y: Math.PI * 1.5, z: 0.5, duration: 2 }, 0)
            .to("body", { backgroundColor: "#020c0f", duration: 2 }, 0) // Transición a fondo cian oscuro

            // --- TRAMO 2: Reensamblaje y Customización de Color ---
            .to(watchCase.position, { z: 0, duration: 2 }, 2)
            .to(topStrap.position, { y: 1.4, duration: 2 }, 2)
            .to(bottomStrap.position, { y: -1.4, duration: 2 }, 2)
            .to(gear1.position, { z: 0.1, duration: 2 }, 2)
            .to(gear2.position, { z: -0.1, duration: 2 }, 2)
            // Cambios estéticos sobre la marcha (Efecto Monster)
            .to(coreMaterial.color, { r: 0.9, g: 0.4, b: 0.1, duration: 1 }, 2) // Giro a material naranja/cobre
            .to(screenMaterial.color, { r: 1, g: 0.4, b: 0, duration: 1 }, 2) 
            .to("body", { backgroundColor: "#140702", duration: 2 }, 2) // Mutación a fondo naranja neón

            // --- TRAMO 3: Enfoque de Cámara y Escáner ---
            .to(cyberWatch.position, { x: -1, duration: 2 }, 4)
            .to(cyberWatch.rotation, { x: Math.PI / 2, y: 0, z: 0, duration: 2 }, 4) // Coloca el reloj plano frente a cámara
            .to(camera.position, { z: 4, duration: 2 }, 4)
            // Disparar los contadores numéricos
            .to("#stat-bat", {
                innerText: "100%",
                snap: { innerText: 1 },
                duration: 2,
                ease: "linear"
            }, 4)
            .to("#stat-cpu", {
                innerText: "TURBO ACTIVE",
                duration: 2
            }, 4);

        /* =========================================================================
           6. INTERACTIVIDAD PREMIUM: BOTÓN DE SOBRECARGA (MODO HACKEO)
           ========================================================================= */
        const overloadBtn = document.getElementById('overload-btn');
        const glitchOverlay = document.getElementById('glitch-overlay');
        let isOverloaded = false;

        overloadBtn.addEventListener('click', () => {
            if(!isOverloaded) {
                isOverloaded = true;
                
                // Activar Capas de Interrupción Visual
                glitchOverlay.style.display = 'block';
                document.body.classList.add('overload-active');
                overloadBtn.innerText = "SYSTEM CRITICAL";

                // Línea de tiempo de distorsión instantánea
                const overloadTl = gsap.timeline();
                overloadTl.to(cyberWatch.rotation, { y: "+=30", x: "+=15", duration: 1, ease: "power4.inOut" })
                          .to(keyLight.color, { r: 1, g: 0, b: 0.3, duration: 0.1 }) // Cambia luces a modo alerta roja
                          .to(rimLight.color, { r: 1, g: 0, b: 0, duration: 0.1 })
                          .to(neonGearMaterial.color, { r: 1, g: 0, b: 0, duration: 0.1 })
                          .to(neonGearMaterial.emissive, { r: 1, g: 0, b: 0, duration: 0.1 })
                          .to(cyberWatch.scale, { x: 1.8, y: 1.8, z: 1.8, duration: 0.5, ease: "bounce.out" });
                
                // Forzar animación cíclica salvaje en los engranajes
                gsap.to(gearGroup.rotation, { z: 50, repeat: -1, duration: 2, ease: "none" });

            } else {
                // Restaurar Sistema
                isOverloaded = false;
                glitchOverlay.style.display = 'none';
                document.body.classList.remove('overload-active');
                overloadBtn.innerText = "DO NOT PRESS";
                
                gsap.killTweensOf(gearGroup.rotation);
                gsap.to(cyberWatch.scale, { x: 1, y: 1, z: 1, duration: 0.5 });
                gsap.to(keyLight.color, { r: 0, g: 0.96, b: 0.83, duration: 0.5 });
                gsap.to(neonGearMaterial.color, { r: 0, g: 0.96, b: 0.83, duration: 0.5 });
                gsap.to(neonGearMaterial.emissive, { r: 0, g: 0.96, b: 0.83, duration: 0.5 });
            }
        });

        /* =========================================================================
           7. BUCLE DE RENDERIZADO (TICK)
           ========================================================================= */
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            // Rotación constante automática ultra suave de los componentes internos
            if(!isOverloaded) {
                gear1.rotation.z = elapsedTime * 0.5;
                gear2.rotation.z = -elapsedTime * 0.8;
                
                // Rotación flotante sutil general
                cyberWatch.rotation.y += 0.003;
            }

            // Interpolación suavizada (Lerp) para el seguimiento del puntero del ratón
            targetX += (mouseX - targetX) * 0.05;
            targetY += (mouseY - targetY) * 0.05;

            // El ratón inclina levemente el grupo entero para reflejar luces
            cyberWatch.rotation.z += targetX * 0.01;
            cyberWatch.rotation.x += targetY * 0.01;

            renderer.render(scene, camera);
        }

        // Inicializar bucle
        animate();

        /* =========================================================================
           8. RESPONSIVE DESIGN (CONTROL DE RESIZE)
           ========================================================================= */
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
